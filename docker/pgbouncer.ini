[databases]
shodasha_db = host=postgres port=5432 dbname=shodasha_db user=shodasha_user password=shodasha_password

[pgbouncer]
listen_addr = *
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5
server_idle_timeout = 60
admin_users = shodasha_user
